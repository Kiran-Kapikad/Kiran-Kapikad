name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Pacman SVG
        run: |
          mkdir -p output
          cat << 'EOF' > output/pacman.svg
          <svg width="1000" height="200" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="#0d1117"/>

            <!-- Grid -->
            <g>
              <!-- simple contribution grid -->
              <script type="application/ecmascript"><![CDATA[
                const svg = document.currentScript.parentNode;
                const cols = 52;
                const rows = 7;
                const size = 12;
                const gap = 4;

                for (let x = 0; x < cols; x++) {
                  for (let y = 0; y < rows; y++) {
                    const rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
                    rect.setAttribute("x", x*(size+gap)+20);
                    rect.setAttribute("y", y*(size+gap)+40);
                    rect.setAttribute("width", size);
                    rect.setAttribute("height", size);
                    rect.setAttribute("fill", "#161b22");
                    svg.appendChild(rect);
                  }
                }
              ]]></script>
            </g>

            <!-- Pacman -->
            <circle cx="200" cy="80" r="10" fill="yellow"/>

            <!-- Ghosts -->
            <circle cx="260" cy="80" r="10" fill="red"/>
            <circle cx="300" cy="80" r="10" fill="cyan"/>
            <circle cx="340" cy="80" r="10" fill="pink"/>

            <!-- Maze line -->
            <path d="M50 80 H900" stroke="white" stroke-width="2"/>
          </svg>
          EOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
